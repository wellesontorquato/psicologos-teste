[supervisord]
nodaemon=true

; Executa os comandos Artisan depois de tudo subir (prioridade 99)
[program:artisan-setup]
command=/bin/bash -c "
echo '==== LIMPEZA DE CACHE ===='
php artisan config:clear 2>&1 | tee -a /var/log/supervisor/artisan-setup.out.log
php artisan route:clear 2>&1 | tee -a /var/log/supervisor/artisan-setup.out.log
php artisan view:clear 2>&1 | tee -a /var/log/supervisor/artisan-setup.out.log
php artisan cache:clear 2>&1 | tee -a /var/log/supervisor/artisan-setup.out.log

echo '==== REBUILD DE CACHE ===='
php artisan config:cache 2>&1 | tee -a /var/log/supervisor/artisan-setup.out.log
php artisan route:cache 2>&1 | tee -a /var/log/supervisor/artisan-setup.out.log

echo '==== LINK STORAGE ===='
php artisan storage:link 2>&1 | tee -a /var/log/supervisor/artisan-setup.out.log

echo '==== FINALIZADO ===='
"
priority=99
autostart=true
startretries=1
stderr_logfile=/var/log/supervisor/artisan-setup.err.log
stdout_logfile=/var/log/supervisor/artisan-setup.out.log

[program:php-fpm]
command=php-fpm
priority=10
autostart=true
startretries=3
stderr_logfile=/var/log/supervisor/php-fpm.err.log
stdout_logfile=/var/log/supervisor/php-fpm.out.log

[program:nginx]
command=nginx -g "daemon off;"
priority=20
autostart=true
startretries=3
stderr_logfile=/var/log/supervisor/nginx.err.log
stdout_logfile=/var/log/supervisor/nginx.out.log
